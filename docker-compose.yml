services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: neuramemory-server
    restart: always
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/neuramemory
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - mongodb
      - qdrant
    ports:
      - "3000:3000"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: neuramemory-client
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - server

  mongodb:
    image: mongo:latest
    container_name: neuramemory-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  qdrant:
    image: qdrant/qdrant:latest
    container_name: neuramemory-qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  mongodb_data:
  qdrant_data:
