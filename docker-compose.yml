services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: neuramemory-server
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/neuramemory
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - mongodb
      - qdrant
    ports:
      - "3000:3000"
    networks:
      - neuramemory-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: neuramemory-client
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - server
    networks:
      - neuramemory-network

  mongodb:
    image: mongo:latest
    container_name: neuramemory-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - neuramemory-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: neuramemory-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - neuramemory-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongodb_data:
    driver: local
  qdrant_data:
    driver: local

networks:
  neuramemory-network:
    driver: bridge
